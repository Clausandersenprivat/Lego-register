<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --bg:#0a0a0f;--surface:#13131c;--surface2:#1c1c2e;--border:#2a2a40;
  --accent:#e3000b;--accent2:#ffcc00;--text:#f0f0f5;--text2:#8888aa;
  --green:#22c55e;--blue:#3b82f6;--purple:#a855f7;--orange:#f97316;
  --radius:14px;
  --safe-top:max(env(safe-area-inset-top,0px), 47px);
  --safe-bottom:max(env(safe-area-inset-bottom,0px), 20px);
  --nav-h:0px;
  --tabs-h:0px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:calc(var(--safe-top)+8px) 16px 14px 72px;
  background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.nav-back{font-size:17px;font-weight:600;cursor:pointer;padding:6px 12px 6px 0;
  color:var(--accent2);display:none;line-height:1;white-space:nowrap;
  background:none;border:none;font-family:'Inter',sans-serif;}
.nav-back.visible{display:flex;align-items:center;gap:4px;}
.nav-titles{flex:1;min-width:0;margin-left:28px;}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent2);line-height:1.1;margin-top:40px;}
.nav-sub{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.tabs{position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:10px 8px calc(var(--safe-bottom)+6px);
  background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);

function roi(marked,vejl){
  if(!vejl||vejl===0)return null;
  const pct=Math.round((marked-vejl)/vejl*100);
  return {pct,pos:pct>=0};
}

// Haptic feedback
function haptic(type='light'){
  if(navigator.vibrate){
    if(type==='light') navigator.vibrate(8);
    else if(type==='medium') navigator.vibrate(18);
    else if(type==='heavy') navigator.vibrate([10,5,10]);
  }
}

function setNav(title,sub,back){
  document.getElementById('nav-title').textContent=title;
  document.getElementById('nav-sub').textContent=sub||'';
  const backBtn=document.getElementById('nav-back');
  backBtn.classList.toggle('visible',!!back);
  document.getElementById('tabs').style.display=back?'none':'flex';
  const floatBack=document.getElementById('float-back-btn');
  if(floatBack) floatBack.classList.toggle('visible',!!back);
  setTimeout(fixNavPadding,0);
}
function goBack(){haptic();if(navStack.length)navStack.pop()();}
function activatePage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');}
function showTab(name,btn){
  navStack=[];activatePage(name);setNav('My Precious','',false);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  if(name==='soeg'){
    setTimeout(()=>document.getElementById('global-search').focus(),300);
    renderGlobalSearch(document.getElementById('global-search').value);
  }
}
function pushDetail(type,extra){
  const restore=()=>{activatePage('oversigt');setNav('My Precious','',false);};
  navStack.push(restore);activatePage('detail');renderDetail(type,extra);
  history.pushState({detail:true},'');
}

// Swipe tilbage fra venstre kant
(function initSwipe(){
  let startX=0,startY=0,tracking=false;
  document.addEventListener('touchstart',e=>{
    if(e.touches[0].clientX<30){startX=e.touches[0].clientX;startY=e.touches[0].clientY;tracking=true;}
    else tracking=false;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!tracking)return;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=Math.abs(e.changedTouches[0].clientY-startY);
    if(dx>60&&dy<50&&navStack.length){goBack();}
    tracking=false;
  },{passive:true});
})();

// Browser tilbage-knap
window.addEventListener('popstate',()=>{if(navStack.length)navStack.pop()();});

function setSetSort(s){
  setSort=s;
  ['val','nr','aar'].forEach(x=>document.getElementById('sort-'+x).classList.toggle('active',x===s));
  renderSetList();
}
function setFigSort(s){
  figSort=s;
  ['pris','val','antal','navn'].forEach(x=>document.getElementById('sort-fig'+x).classList.toggle('active',x===s));
  renderFigList();
}

/* ---------- OVERSIGT ---------- */
function initOversigt(){
  const s=D.summary;
  document.getElementById('hero-dkk').textContent=dkkS(s.total_usd)+' kr.';
  document.getElementById('hero-usd').textContent=usd(s.total_usd)+' · April 2026';

  const grid=document.getElementById('stats-grid');
  const saetRoi=s.saet_usd>0?Math.round((s.saet_usd-(D.sets.reduce((a,x)=>a+(x.vejl||0),0)))/s.saet_usd*100):0;
  const cards=[
    {icon:'📦',num:s.saet_total,unit:'åbne sæt',sub:dkk(s.saet_usd),label:'Sæt · '+s.temaer+' temaer',arr:'Se alle →',click:()=>pushDetail('saets')},
    {icon:'🔒',num:s.saet_uaabnet,unit:'uåbnede sæt',sub:null,label:'Uåbnede / forseglede',arr:'Se alle →',click:()=>pushDetail('uaabnet')},
    {icon:'🧍',num:s.fig_antal.toLocaleString('da-DK'),unit:'figurer',sub:dkk(s.fig_usd),label:s.fig_typer+' figurtyper',arr:'Se alle →',click:()=>pushDetail('figurer')},
    {icon:'🔧',num:s.moc_s_total+s.moc_f_total,unit:'MOC builds',sub:dkk(s.moc_s_usd+s.moc_f_usd),label:'MOC sæt & figurer',arr:'Se alle →',click:()=>pushDetail('moc')},
  ];
  cards.forEach(c=>{
    const el=mkEl('div','stat-card');el.onclick=c.click;
    el.innerHTML=`<div class="stat-icon">${c.icon}</div><div class="stat-num">${c.num} <span style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;">${c.unit}</span></div>${c.sub?`<div class="stat-sub">${c.sub}</div>`:''}<div class="stat-label">${c.label}</div><div class="stat-arr">${c.arr}</div>`;
    grid.appendChild(el);
  });

}

/* ---------- DETAIL ---------- */
function renderDetail(type,extra){
  const el=document.getElementById('detail-content');el.innerHTML='';
  const list=mkEl('div','card-list');

  if(type==='total'){
    const s=D.summary;
    setNav('Samlet Oversigt',dkk(s.total_usd),true);
    const items=[
      {icon:'📦',label:`LEGO Sæt — ${s.saet_total} sæt`,val:s.saet_usd,click:()=>pushDetail('saets')},
      {icon:'🧍',label:`Minifigurer — ${s.fig_antal} stk.`,val:s.fig_usd,click:()=>pushDetail('figurer')},
      {icon:'🔧',label:`MOC Sæt — ${s.moc_s_total} builds`,val:s.moc_s_usd,click:()=>pushDetail('moc')},
      {icon:'🎭',label:`MOC Figurer — ${s.moc_f_antal} stk.`,val:s.moc_f_usd,click:()=>pushDetail('mocfigs')},
    ];
    items.forEach(it=>{
      const c=mkEl('div','card');c.onclick=it.click;
      c.innerHTML=`<div class="card-top"><div class="stat-icon">${it.icon}</div><div class="card-info"><div class="card-naam">${it.label}</div></div><div class="card-right"><div class="card-dkk">${dkk(it.val)}</div><div class="card-usd">${usd(it.val)}</div></div></div>`;
      list.appendChild(c);
    });
  } else if(['saets','uaabnet','tema'].includes(type)){
    let items=[...D.sets],title;
    if(type==='uaabnet'){items=items.filter(s=>s.stand==='Uåbnet'||s.stand==='Forseglet');title='Uåbnede Sæt';}
    else if(type==='tema'){items=items.filter(s=>s.tema===extra);title=extra;}
    else title='Alle Sæt';
    items.sort((a,b)=>b.marked-a.marked);
    const total=items.reduce((a,s)=>a+s.marked,0);
    setNav(title,`${items.length} sæt · ${dkk(total)}`,true);
    items.forEach(s=>list.appendChild(mkSetCard(s)));
  } else if(['figurer','figtema'].includes(type)){
    let items=[...D.lego_figs],title;
    if(type==='figtema'){items=items.filter(f=>f.tema===extra);title=extra;}
    else title='Alle Minifigurer';
    items.sort((a,b)=>b.total-a.total);
    const cnt=items.reduce((a,f)=>a+f.antal,0);
    setNav(title,`${items.length} typer · ${cnt} stk.`,true);
    items.forEach(f=>list.appendChild(mkFigCard(f)));
  } else if(type==='moc'){

      list.appendChild(c);
    });

    setNav('MOC Figurer',`${D.summary.moc_f_antal} stk.`,true);
    [...D.moc_figs].sort((a,b)=>b.total-a.total).forEach(f=>{

}

function mkSetCard(s){
  const c=mkEl('div','card');
  const ua=s.stand==='Uåbnet';
  const forseglet=s.stand==='Forseglet';
  const badgeClass=ua?'badge-uaabnet':forseglet?'badge-forseglet':'badge-brugt';
  const badgeLabel=ua?'Uåbnet':forseglet?'Forseglet':'Brugt';
  const r=roi(s.marked,s.vejl);
  const roiStr=r?`<span style="font-size:10px;color:${r.pos?'var(--green)':'var(--accent)'}"> ${r.pos?'▲':'▼'}${Math.abs(r.pct)}%</span>`:'';
  c.innerHTML=`<div class="card-top"><div class="badge ${badgeClass}">${badgeLabel}</div><div class="card-info"><div class="card-naam">${s.navn}</div><div class="card-meta">#${s.nr} · ${s.aar} · ${s.dele?s.dele.toLocaleString('da-DK'):'?'} dele${s.figs?' · '+s.figs+' fig.':''}</div></div><div class="card-right"><div class="card-dkk">${dkkS(s.marked)} kr.${roiStr}</div><div class="card-usd">${usd(s.marked)}</div></div></div><div class="card-tag">${s.tema}</div>`;
  c.onclick=()=>{haptic();openSetModal(s);}; return c;
}
function mkFigCard(f){
  const c=mkEl('div','fig-card');
  const prisFremhævet = figSort==='pris';
  const prisStr = prisFremhævet
    ? `<div class="fig-dkk">${dkkS(f.pris)} kr.<span style="font-size:11px;font-weight:400;color:var(--text2)">/stk</span></div><div class="fig-usd">${usd(f.pris)}/stk</div><div class="fig-count">×${f.antal} · total ${dkk(f.total)}</div>`
    : `<div class="fig-dkk">${dkkS(f.total)} kr.</div><div class="fig-usd">${usd(f.total)}</div><div class="fig-count">×${f.antal} · ${dkk(f.pris)}/stk.</div>`;
  const blKey=(f.bl_nr||'').toLowerCase();
  const setInfo=FIG_SET_MAP[blKey];
  let saetBadge='';
  if(setInfo){
    const hasBrugt=setInfo.brugt&&setInfo.brugt.length>0;
    const hasUaabnet=setInfo.uaabnet&&setInfo.uaabnet.length>0;
    if(hasBrugt) saetBadge=`<span class="badge-saet">📦 ${setInfo.brugt[0].split(' (#')[0]}</span>`;
    else if(hasUaabnet) saetBadge=`<span class="badge-saet badge-saet-uaabnet">🔒 ${setInfo.uaabnet[0].split(' (#')[0]}</span>`;
  }
  c.innerHTML=`<div class="fig-top"><div class="badge badge-fig">Fig</div><div class="fig-info"><div class="fig-naam">${f.navn}</div><div class="fig-meta">${f.tema}${f.bl_nr&&f.bl_nr!=='None'?' · '+f.bl_nr:''}</div>${saetBadge}</div><div class="fig-right">${prisStr}</div></div>`;
  c.onclick=()=>{haptic();openFigModal(f);}; return c;
}

/* ---------- SÆT ---------- */
function renderSetFilters(){
  const el=document.getElementById('set-filters');el.innerHTML='';
  ['Alle','Uåbnet','Forseglet','Brugt','Aktiv',...D.temaer_saet].forEach(f=>{
    const b=mkEl('button','filter-btn'+(f===setFilter?' active':''));
    b.textContent=f;b.onclick=()=>{setFilter=f;renderSetFilters();renderSetList();};el.appendChild(b);
  });
  const tl=document.getElementById('tema-list');
  const tt=document.getElementById('tema-list-title');
  if(setFilter==='Alle'&&!setSearch){
    tt.style.display='';tl.style.display='';
    tl.innerHTML='';
    Object.entries(D.tema_stats).filter(([t])=>t).sort((a,b)=>b[1].usd-a[1].usd).forEach(([tema,stat])=>{
      const d=mkEl('div','tema-row');d.onclick=()=>{setFilter=tema;renderSetFilters();renderSetList();};
      d.innerHTML=`<span class="tema-name">${tema}</span><span class="tema-count">${stat.count} sæt</span><span class="tema-dkk">${dkk(stat.usd)}</span><span style="color:var(--text2);font-size:14px">›</span>`;
      tl.appendChild(d);
    });
  } else {
    tt.style.display='none';tl.style.display='none';
  }
}
function isUaabnet(stand){
  const s=stand.toLowerCase();
  return s==='uåbnet'||s==='forseglet';
}
function renderSetList(){
  let items=[...D.sets];
  if(setFilter==='Uåbnet')items=items.filter(s=>s.stand==='Uåbnet');
  else if(setFilter==='Forseglet')items=items.filter(s=>s.stand==='Forseglet');
  else if(setFilter==='Brugt')items=items.filter(s=>s.stand==='Brugt'||s.stand==='Bygget');
  else if(setFilter==='Aktiv')items=items.filter(s=>s.status==='Aktiv');
  else if(setFilter!=='Alle')items=items.filter(s=>s.tema===setFilter);
  if(setSearch)items=items.filter(s=>s.navn.toLowerCase().includes(setSearch)||s.nr.toString().includes(setSearch)||s.tema.toLowerCase().includes(setSearch));
  if(setSort==='val')items.sort((a,b)=>b.marked-a.marked);
  else if(setSort==='nr')items.sort((a,b)=>a.nr-b.nr);
  else if(setSort==='aar')items.sort((a,b)=>b.aar-a.aar);
  const tot=items.reduce((a,s)=>a+s.marked,0);
  const filterInfo=(setFilter!=='Alle'||setSearch)?` · filtreret${setSearch?' 🔍':''}`:'' ;
  document.getElementById('set-count').textContent=`${items.length} sæt · ${dkk(tot)}${filterInfo}`;
  const el=document.getElementById('set-list');el.innerHTML='';
  if(!items.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Ingen sæt fundet</div>';return;}
  items.forEach(s=>el.appendChild(mkSetCard(s)));
}

/* ---------- FIGURER ---------- */
function renderFigFilters(){
  const el=document.getElementById('fig-filters');el.innerHTML='';
  ['Alle',...D.temaer_figs].forEach(f=>{
    const b=mkEl('button','filter-btn'+(f===figFilter?' active':''));
    b.textContent=f;b.onclick=()=>{figFilter=f;renderFigFilters();renderFigList();};el.appendChild(b);
  });
}
function renderFigList(){
  let items=[...D.lego_figs];
  if(figFilter!=='Alle')items=items.filter(f=>f.tema===figFilter);
  if(figSearch)items=items.filter(f=>f.navn.toLowerCase().includes(figSearch)||f.tema.toLowerCase().includes(figSearch)||(f.bl_nr&&f.bl_nr.toLowerCase().includes(figSearch)));
  if(figSort==='val')items.sort((a,b)=>b.total-a.total||b.pris-a.pris);
  else if(figSort==='pris')items.sort((a,b)=>b.pris-a.pris||b.total-a.total);
  else if(figSort==='antal')items.sort((a,b)=>b.antal-a.antal);
  else if(figSort==='navn')items.sort((a,b)=>a.navn.localeCompare(b.navn,'da'));
  const tot=items.reduce((a,f)=>a+f.total,0);
  const cnt=items.reduce((a,f)=>a+f.antal,0);
  document.getElementById('fig-count').textContent=`${items.length} typer · ${cnt} stk. · ${dkk(tot)}`;
  const el=document.getElementById('fig-list');el.innerHTML='';
  if(!items.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Ingen figurer fundet</div>';return;}
  items.forEach(f=>el.appendChild(mkFigCard(f)));
}

    <div class="modal-title">${s.navn}</div>
    <div class="modal-tema">${s.tema} · MOC</div>
    <div class="modal-price-block">
      <div><div style="font-size:11px;color:var(--text2);margin-bottom:2px">Markedsværdi</div><div class="modal-price-main">${dkkS(s.marked)} kr.</div></div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--text2)">USD</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text2)">${usd(s.marked)}</div></div>
    </div>
    <div class="modal-row"><span class="modal-key">År</span><span class="modal-val">${s.aar}</span></div>
    <div class="modal-row"><span class="modal-key">Dele</span><span class="modal-val">${s.dele?s.dele.toLocaleString('da-DK'):'–'}</span></div>
    <div class="modal-row"><span class="modal-key">Designer</span><span class="modal-val">${s.designer||'–'}</span></div>
    <button class="close-btn" onclick="closeModal()">Luk</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function openMocFigModal(f){
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">${f.navn}</div>
    <div class="modal-tema">${f.tema} · Custom</div>
    <div class="modal-price-block">
      <div><div style="font-size:11px;color:var(--text2);margin-bottom:2px">Samlet (${f.antal} stk.)</div><div class="modal-price-main">${dkkS(f.total)} kr.</div></div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--text2)">Pr. stk.</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text2)">${dkk(f.pris)}</div></div>
    </div>
    <div class="modal-row"><span class="modal-key">År</span><span class="modal-val">${f.aar}</span></div>
    <button class="close-btn" onclick="closeModal()">Luk</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){haptic();document.getElementById('modal-overlay').classList.remove('open');}

// Swipe ned for at lukke modal
(function initModalSwipe(){
  let startY=0,isDragging=false;
  document.addEventListener('touchstart',e=>{
    const overlay=document.getElementById('modal-overlay');
    if(!overlay.classList.contains('open'))return;
    const modal=overlay.querySelector('.modal');
    if(modal&&modal.scrollTop===0){startY=e.touches[0].clientY;isDragging=true;}
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    const dy=e.touches[0].clientY-startY;
    const overlay=document.getElementById('modal-overlay');
    const modal=overlay.querySelector('.modal');
    if(dy>0&&modal){modal.style.transform=`translateY(${dy}px)`;modal.style.transition='none';}
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!isDragging)return;
    isDragging=false;
    const dy=e.changedTouches[0].clientY-startY;
    const overlay=document.getElementById('modal-overlay');
    const modal=overlay.querySelector('.modal');
    if(modal){
      modal.style.transition='transform 0.3s ease';
      if(dy>100){closeModal();setTimeout(()=>{modal.style.transform='';modal.style.transition='';},300);}
      else{modal.style.transform='';setTimeout(()=>{modal.style.transition='';},300);}
    }
  },{passive:true});
})();

function renderGlobalSearch(q){
  const el=document.getElementById('soeg-results');
  const cnt=document.getElementById('soeg-count');
  el.innerHTML='';
  if(!q||q.length<2){cnt.textContent='Skriv mindst 2 tegn for at søge';return;}
  const ql=q.toLowerCase();
  const results=[];

  // Søg i sæt
  D.sets.forEach(s=>{
    if(s.navn.toLowerCase().includes(ql)||s.nr.toLowerCase().includes(ql)||s.tema.toLowerCase().includes(ql)){
      results.push({type:'saet',data:s});
    }
  });

  // Søg i figurer
  D.lego_figs.forEach(f=>{
    if(f.navn.toLowerCase().includes(ql)||f.bl_nr.toLowerCase().includes(ql)||f.tema.toLowerCase().includes(ql)){
      results.push({type:'fig',data:f});
    }
  });

  cnt.textContent=`${results.length} resultater for "${q}"`;
  if(results.length===0){el.innerHTML=`<div style="color:var(--text2);font-size:14px;padding:20px 0;text-align:center">Ingen resultater</div>`;return;}

  results.slice(0,50).forEach(r=>{
    if(r.type==='saet'){
      const s=r.data;
      const ua=s.stand==='Uåbnet';
      const forseglet=s.stand==='Forseglet';
      const badgeClass=ua?'badge-uaabnet':forseglet?'badge-forseglet':'badge-brugt';
      const badgeLabel=ua?'Uåbnet':forseglet?'Forseglet':'Brugt';
      const roi_=roi(s.marked,s.vejl);
      const roiStr=roi_?`<span style="font-size:10px;color:${roi_.pos?'var(--green)':'var(--accent)'}"> ${roi_.pos?'▲':'▼'}${Math.abs(roi_.pct)}%</span>`:'';
      const c=mkEl('div','card');
      c.innerHTML=`<div class="card-top"><div class="badge ${badgeClass}">${badgeLabel}</div><div class="card-info"><div class="card-naam">${s.navn}</div><div class="card-meta">#${s.nr} · ${s.aar} · ${s.dele?s.dele.toLocaleString('da-DK'):'?'} dele${s.figs?' · '+s.figs+' fig.':''}</div></div><div class="card-right"><div class="card-dkk">${dkkS(s.marked)} kr.${roiStr}</div><div class="card-usd">${usd(s.marked)}</div></div></div><div class="card-tag">${s.tema}</div>`;
      c.onclick=()=>openSetModal(s);
      el.appendChild(c);
    } else {
      const f=r.data;
      const blKey=(f.bl_nr||'').toLowerCase();
      const setInfo=FIG_SET_MAP[blKey];
      let saetBadge='';
      if(setInfo){
        const hasBrugt=setInfo.brugt&&setInfo.brugt.length>0;
        const hasUaabnet=setInfo.uaabnet&&setInfo.uaabnet.length>0;
        if(hasBrugt) saetBadge=`<span class="badge-saet">📦 ${setInfo.brugt[0].split(' (#')[0]}</span>`;
        else if(hasUaabnet) saetBadge=`<span class="badge-saet badge-saet-uaabnet">🔒 ${setInfo.uaabnet[0].split(' (#')[0]}</span>`;
      }
      const c=mkEl('div','fig-card');
      const prisStr=`<div class="fig-dkk">${dkkS(f.pris)} kr.<span style="font-size:11px;font-weight:400;color:var(--text2)">/stk</span></div><div class="fig-usd">${usd(f.pris)}/stk</div><div class="fig-count">×${f.antal} · total ${dkk(f.total)}</div>`;
      c.innerHTML=`<div class="fig-top"><div class="badge badge-fig">Fig</div><div class="fig-info"><div class="fig-naam">${f.navn}</div><div class="fig-meta">${f.tema}${f.bl_nr&&f.bl_nr!=='None'?' · '+f.bl_nr:''}</div>${saetBadge}</div><div class="fig-right">${prisStr}</div></div>`;
      c.onclick=()=>openFigModal(f);
      el.appendChild(c);
    }
  });
  if(results.length>50){
    const more=mkEl('div','');
    more.style.cssText='text-align:center;color:var(--text2);font-size:13px;padding:12px';
    more.textContent=`+${results.length-50} flere resultater — præcisér søgningen`;
    el.appendChild(more);
  }
}
function scrollToTop(){
  window.scrollTo({top:0,behavior:'smooth'});
  document.documentElement.scrollTop=0;
  document.body.scrollTop=0;
}
function updateScrollBtn(){
  const btn=document.getElementById('scroll-top-btn');
  const tabs=document.querySelector('.tabs');
  const tabsH=tabs.style.display!=='none'?tabs.getBoundingClientRect().height:0;
  btn.style.bottom=(tabsH+16)+'px';
  const sy=window.scrollY||document.documentElement.scrollTop||document.body.scrollTop||0;
  btn.classList.toggle('visible',sy>300);
}

/* ---------- INIT ---------- */
function fixNavPadding(){
  const nav=document.querySelector('.nav');
  const content=document.querySelector('.content');
  const tabs=document.querySelector('.tabs');
  const navH=nav.getBoundingClientRect().height;
  const tabsVisible=tabs.style.display!=='none';
  const tabsH=tabsVisible?tabs.getBoundingClientRect().height:0;
  if(navH>0){
    content.style.paddingTop=(navH+4)+'px';
    document.documentElement.style.setProperty('--nav-actual', navH+'px');
  }
  if(tabsH>0){
    content.style.paddingBottom=(tabsH+8)+'px';
    document.documentElement.style.setProperty('--tabs-actual', tabsH+'px');
  } else {
    content.style.paddingBottom='100px';
    document.documentElement.style.setProperty('--tabs-actual', '100px');
  }
  const btn=document.getElementById('scroll-top-btn');
  if(btn&&tabsH>0) btn.style.bottom=(tabsH+16)+'px';
}
function init(){
  // Kør fixNavPadding med requestAnimationFrame + flere retries for iPhone PWA
  requestAnimationFrame(()=>{
    fixNavPadding();
    requestAnimationFrame(fixNavPadding);
  });
  setTimeout(fixNavPadding,100);
  setTimeout(fixNavPadding,300);
  setTimeout(fixNavPadding,800);
  setTimeout(fixNavPadding,1500);
  window.addEventListener('resize',fixNavPadding);
  window.addEventListener('orientationchange',()=>{
    setTimeout(fixNavPadding,200);
    setTimeout(fixNavPadding,600);
  });
  initOversigt();
  renderSetFilters();renderSetList();
  renderFigFilters();renderFigList();
  renderStats();
  window.addEventListener('scroll',updateScrollBtn,{passive:true});
  updateScrollBtn();
  document.getElementById('global-search').addEventListener('input',e=>{renderGlobalSearch(e.target.value.toLowerCase());});
  document.getElementById('set-search').addEventListener('input',e=>{setSearch=e.target.value.toLowerCase();renderSetFilters();renderSetList();});
  document.getElementById('fig-search').addEventListener('input',e=>{figSearch=e.target.value.toLowerCase();renderFigList();});
}
init();
</script>
